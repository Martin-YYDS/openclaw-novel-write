name: Publish to ClawHub

on:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Get version
        id: version
        run: |
          # Use commit date + short hash as pre-release version
          DATE=$(date +%Y%m%d%H%M%S)
          HASH=${GITHUB_SHA:0:7}
          echo "VERSION=0.0.1-alpha.${DATE}.${HASH}" >> $GITHUB_OUTPUT
          
      - name: Install ClawHub CLI
        run: npm install -g clawhub
        
      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          clawhub login --token $CLAWHUB_TOKEN
          clawhub publish . \
            --slug openclaw-novel-write \
            --name "小说写作助手" \
            --version ${{ steps.version.outputs.VERSION }} \
            --changelog "自动发布 from commit ${{ github.sha }}"
